<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Counter Generator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar no-print">
            <div style="text-align: right; font-size: 14px; margin-bottom: 20px;">
                <span style="color: #000; font-weight: bold;">English</span> | 
                <a href="index.zh-TW.html" style="color: #666; text-decoration: none;">繁體中文</a>
            </div>
            <header>
                <h1>MTG Counter</h1>
                <p>Generator for printing</p>
            </header>

            <section class="control-group">
                <h2>Layout Settings</h2>
                <div class="input-pair">
                    <label>
                        Columns
                        <input type="number" id="colsInput" value="4" min="1" max="10">
                    </label>
                    <label>
                        Rows
                        <input type="number" id="rowsInput" value="5" min="1" max="15">
                    </label>
                </div>
                <div class="hint">Defaults fits A4 (210 x 297mm)</div>
            </section>

            <section class="control-group feature-list">
                <h2>Counter Options</h2>
                
                <div class="counter-input">
                    <label>+1/+1 Counter</label>
                    <input type="number" data-type="plusOne" value="5" min="0">
                </div>
                
                <div class="counter-input">
                    <label>-1/-1 Counter</label>
                    <input type="number" data-type="minusOne" value="0" min="0">
                </div>
                <hr>
                <div class="counter-input"><label>Flying</label><input type="number" data-type="flying" value="3" min="0"></div>
                <div class="counter-input"><label>Trample</label><input type="number" data-type="trample" value="2" min="0"></div>
                <div class="counter-input"><label>Deathtouch</label><input type="number" data-type="deathtouch" value="1" min="0"></div>
                <div class="counter-input"><label>Defender</label><input type="number" data-type="defender" value="0" min="0"></div>
                <div class="counter-input"><label>Double Strike</label><input type="number" data-type="double-strike" value="0" min="0"></div>
                <div class="counter-input"><label>Enchant</label><input type="number" data-type="enchant" value="0" min="0"></div>
                <div class="counter-input"><label>Equip</label><input type="number" data-type="equip" value="0" min="0"></div>
                <div class="counter-input"><label>First Strike</label><input type="number" data-type="first-strike" value="0" min="0"></div>
                <div class="counter-input"><label>Flash</label><input type="number" data-type="flash" value="0" min="0"></div>
                <div class="counter-input"><label>Haste</label><input type="number" data-type="haste" value="0" min="0"></div>
                <div class="counter-input"><label>Hexproof</label><input type="number" data-type="hexproof" value="0" min="0"></div>
                <div class="counter-input"><label>Indestructible</label><input type="number" data-type="indestructible" value="0" min="0"></div>
                <div class="counter-input"><label>Lifelink</label><input type="number" data-type="liftlink" value="0" min="0"></div>
                <div class="counter-input"><label>Menace</label><input type="number" data-type="menace" value="0" min="0"></div>
                <div class="counter-input"><label>Protection</label><input type="number" data-type="protection" value="0" min="0"></div>
                <div class="counter-input"><label>Prowess</label><input type="number" data-type="prowess" value="0" min="0"></div>
                <div class="counter-input"><label>Reach</label><input type="number" data-type="reach" value="0" min="0"></div>
                <div class="counter-input"><label>Scry</label><input type="number" data-type="scry" value="0" min="0"></div>
                <div class="counter-input"><label>Stun</label><input type="number" data-type="stun" value="0" min="0"></div>
                <div class="counter-input"><label>Vigilance</label><input type="number" data-type="vigilance" value="0" min="0"></div>
                <div class="counter-input"><label>Ward</label><input type="number" data-type="ward" value="0" min="0"></div>
            </section>

            <section class="control-group token-builder">
                <h2>Build Tokens</h2>
                <div class="token-form">
                    <select id="tokenKeyword">
                        <!-- Javascript dynamic options -->
                        <option value="none">None</option>
                    </select>
                    <div class="pt-inputs">
                        <input type="text" id="tokenPower" placeholder="P" maxlength="2" class="pt-box">
                        <span>/</span>
                        <input type="text" id="tokenToughness" placeholder="T" maxlength="2" class="pt-box">
                        <span class="x-times">x</span>
                        <input type="number" id="tokenQty" value="1" min="1" max="99" class="qty-box">
                    </div>
                    <button id="addTokenBtn" class="btn outline token-add-btn">Add to List</button>
                </div>
                <div class="token-list">
                    <ul id="tokenListContainer"></ul>
                </div>
            </section>

            <div class="action-area">
                <button id="generateBtn" class="btn primary">Update Preview</button>
                <button id="printBtn" class="btn outline" style="margin-bottom: 8px;">Print PDF</button>
                <button id="resetAllBtn" class="btn outline" style="width: 100%; border-color: #c9302c; color: #fff; background-color: #c9302c;">Reset All</button>
            </div>
            
             <footer class="footer">
                <p>For personal use only. Use Chrome for best print result.</p>
            </footer>
        </aside>

        <!-- Right Preview (A4 Paper size) -->
        <main class="preview-area">
            <div id="printPage" class="a4-page">
                <div id="counterGrid" class="counter-grid">
                    <!-- Javascript will render counters here -->
                </div>
            </div>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
